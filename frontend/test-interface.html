<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Answers Platform - Multilingual</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 {
            color: #333;
            font-size: 2em;
        }
        
        .subtitle {
            color: #666;
            margin-top: 5px;
        }
        
        .language-selector {
            position: relative;
        }
        
        .lang-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }
        
        .lang-btn:hover {
            transform: translateY(-2px);
        }
        
        .lang-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 10px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 10px;
            min-width: 250px;
            display: none;
            z-index: 1000;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .lang-dropdown.show {
            display: block;
            animation: fadeIn 0.2s ease-in;
        }
        
        .lang-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .lang-option:hover {
            background: #f0f0f0;
        }
        
        .lang-option.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .lang-flag {
            font-size: 24px;
        }
        
        .lang-name {
            font-weight: 600;
        }
        
        .lang-native {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        
        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .depth-selector {
            margin-bottom: 20px;
        }
        
        .depth-options {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }
        
        .depth-option {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            background: white;
        }
        
        .depth-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .depth-option.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .depth-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .depth-desc {
            font-size: 11px;
            opacity: 0.8;
        }
        
        .conversation-indicator {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
        }
        
        .conversation-indicator.show {
            display: block;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .compare-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }
        
        .compare-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            margin-top: 15px;
            font-size: 14px;
            padding: 12px 20px;
        }
        
        .compare-btn:hover {
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }
        
        .comparison-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #f5576c;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .comparison-tradition {
            font-weight: 600;
            color: #f5576c;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .comparison-summary {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
        }
        
        .answer {
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .metadata {
            font-size: 14px;
            color: #666;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        
        .metadata span {
            display: inline-block;
            margin-right: 15px;
        }
        
        .badge {
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .error {
            background: #fee;
            border-left-color: #c33;
            color: #c33;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .follow-up-input {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            display: none;
        }
        
        .follow-up-input.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <!-- Custom Logo SVG -->
                <svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="flex-shrink: 0;">
                    <defs>
                        <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                        </linearGradient>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                    
                    <!-- Outer circle - representing unity of wisdom -->
                    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGradient)" stroke-width="3" opacity="0.3"/>
                    
                    <!-- Eight rays representing 8 traditions -->
                    <g filter="url(#glow)">
                        <!-- Ray 1 - Top (Stoicism) -->
                        <line x1="50" y1="15" x2="50" y2="25" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
                        
                        <!-- Ray 2 - Top Right (Christianity) -->
                        <line x1="71.2" y1="21.2" x2="65.9" y2="28.8" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
                        
                        <!-- Ray 3 - Right (Islam) -->
                        <line x1="85" y1="42.4" x2="75" y2="45.9" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
                        
                        <!-- Ray 4 - Bottom Right (Buddhism) -->
                        <line x1="78.8" y1="71.2" x2="71.2" y2="65.9" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
                        
                        <!-- Ray 5 - Bottom (Judaism) -->
                        <line x1="50" y1="85" x2="50" y2="75" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
                        
                        <!-- Ray 6 - Bottom Left (Hinduism) -->
                        <line x1="21.2" y1="78.8" x2="28.8" y2="71.2" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
                        
                        <!-- Ray 7 - Left (Taoism) -->
                        <line x1="15" y1="57.6" x2="25" y2="54.1" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
                        
                        <!-- Ray 8 - Top Left (Humanism) -->
                        <line x1="21.2" y1="28.8" x2="28.8" y2="34.1" stroke="url(#logoGradient)" stroke-width="3" stroke-linecap="round"/>
                    </g>
                    
                    <!-- Center symbol - Open book / wisdom -->
                    <path d="M 35 45 Q 50 40 65 45 L 65 60 Q 50 55 35 60 Z" 
                          fill="url(#logoGradient)" 
                          opacity="0.8"
                          filter="url(#glow)"/>
                    
                    <!-- Light/Knowledge emanating from center -->
                    <circle cx="50" cy="50" r="8" fill="white" opacity="0.9"/>
                    <circle cx="50" cy="50" r="5" fill="url(#logoGradient)"/>
                    
                    <!-- Small dots at the end of each ray -->
                    <circle cx="50" cy="15" r="2.5" fill="url(#logoGradient)"/>
                    <circle cx="71.2" cy="21.2" r="2.5" fill="url(#logoGradient)"/>
                    <circle cx="85" cy="42.4" r="2.5" fill="url(#logoGradient)"/>
                    <circle cx="78.8" cy="71.2" r="2.5" fill="url(#logoGradient)"/>
                    <circle cx="50" cy="85" r="2.5" fill="url(#logoGradient)"/>
                    <circle cx="21.2" cy="78.8" r="2.5" fill="url(#logoGradient)"/>
                    <circle cx="15" cy="57.6" r="2.5" fill="url(#logoGradient)"/>
                    <circle cx="21.2" cy="28.8" r="2.5" fill="url(#logoGradient)"/>
                </svg>
                
                <div>
                    <h1 id="appTitle" data-translate="app_title">Answers Platform</h1>
                    <p class="subtitle" id="appSubtitle" data-translate="app_subtitle">Wisdom from 8 philosophical and religious traditions</p>
                </div>
            </div>
            
            <div class="language-selector">
                <button class="lang-btn" onclick="toggleLanguageDropdown()">
                    <span id="currentLangFlag">🇬🇧</span>
                    <span id="currentLangName">English</span>
                    <span>▼</span>
                </button>
                <div class="lang-dropdown" id="langDropdown"></div>
            </div>
        </div>
        
        <form id="questionForm">
            <div class="conversation-indicator" id="convIndicator">
                💬 Продолжение диалога | Conversation in progress
            </div>
            
            <div class="form-group">
                <label for="tradition" id="selectTraditionLabel" data-translate="select_tradition">Select a Tradition:</label>
                <select id="tradition" required>
                    <option value="stoicism" data-translate="tradition_stoicism">Stoicism</option>
                    <option value="christianity" data-translate="tradition_christianity">Christianity</option>
                    <option value="islam" data-translate="tradition_islam">Islam</option>
                    <option value="buddhism" data-translate="tradition_buddhism">Buddhism</option>
                    <option value="judaism" data-translate="tradition_judaism">Judaism</option>
                    <option value="hinduism" data-translate="tradition_hinduism">Hinduism</option>
                    <option value="taoism" data-translate="tradition_taoism">Taoism</option>
                    <option value="humanism" data-translate="tradition_humanism">Secular Humanism</option>
                </select>
            </div>
            
            <div class="depth-selector">
                <label id="depthLabel" data-translate="depth_of_answer">Depth of Answer:</label>
                <div class="depth-options">
                    <div class="depth-option active" data-depth="basic" onclick="selectDepth('basic')">
                        <div class="depth-title">📝 Basic</div>
                        <div class="depth-desc">Quick overview (~300 words)</div>
                    </div>
                    <div class="depth-option" data-depth="detailed" onclick="selectDepth('detailed')">
                        <div class="depth-title">📖 Detailed</div>
                        <div class="depth-desc">Comprehensive (~500 words)</div>
                    </div>
                    <div class="depth-option" data-depth="comprehensive" onclick="selectDepth('comprehensive')">
                        <div class="depth-title">🎓 Comprehensive</div>
                        <div class="depth-desc">In-depth analysis (~800 words)</div>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="question" id="enterQuestionLabel" data-translate="enter_question">Enter your question:</label>
                <textarea 
                    id="question" 
                    data-placeholder="question_placeholder"
                    placeholder="For example: How to overcome fear of the future?"
                    required
                    minlength="10"
                    maxlength="500"
                ></textarea>
            </div>
            
            <button type="submit" id="submitBtn" data-translate="get_answer">
                Get Answer
            </button>
        </form>
        
        <div id="result" class="result">
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Generating answer...</p>
            </div>
            <div id="content"></div>
        </div>
    </div>

        function getTranslation(key) {
            if (translations[currentLang] && translations[currentLang][key]) {
                return translations[currentLang][key];
            }
            if (translations['en'][key]) {
                return translations['en'][key];
            }
            return key;
        }
        
        const form = document.getElementById('questionForm');
        const resultDiv = document.getElementById('result');
        const loadingDiv = document.getElementById('loading');
        const contentDiv = document.getElementById('content');
        const submitBtn = document.getElementById('submitBtn');
        const convIndicator = document.getElementById('convIndicator');
        
        async function loadLanguages() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/languages');
                const data = await response.json();
                supportedLanguages = data.languages;
                renderLanguageDropdown();
                
                const browserLang = navigator.language.split('-')[0];
                if (supportedLanguages.find(l => l.code === browserLang)) {
                    setLanguage(browserLang);
                }
                
                await createConversation();
            } catch (error) {
                console.error('Failed to load languages:', error);
            }
        }
        
        async function createConversation() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/conversations/new', {
                    method: 'POST'
                });
                const data = await response.json();
                conversationId = data.conversation_id;
                console.log('✅ New conversation created:', conversationId);
            } catch (error) {
                console.error('Failed to create conversation:', error);
            }
        }
        
        function selectDepth(depth) {
            currentDepth = depth;
            document.querySelectorAll('.depth-option').forEach(opt => {
                opt.classList.remove('active');
                if (opt.dataset.depth === depth) {
                    opt.classList.add('active');
                }
            });
        }
        
        function renderLanguageDropdown() {
            const dropdown = document.getElementById('langDropdown');
            dropdown.innerHTML = supportedLanguages.map(lang => `
                <div class="lang-option ${lang.code === currentLang ? 'active' : ''}" 
                     onclick="setLanguage('${lang.code}')">
                    <span class="lang-flag">${lang.flag}</span>
                    <div>
                        <div class="lang-name">${lang.native_name}</div>
                        <div class="lang-native">${lang.name}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleLanguageDropdown() {
            const dropdown = document.getElementById('langDropdown');
            dropdown.classList.toggle('show');
        }
        
        function setLanguage(langCode) {
            currentLang = langCode;
            const langInfo = supportedLanguages.find(l => l.code === langCode);
            
            document.getElementById('currentLangFlag').textContent = langInfo.flag;
            document.getElementById('currentLangName').textContent = langInfo.native_name;
            
            document.getElementById('langDropdown').classList.remove('show');
            
            updateUITranslations();
            
            localStorage.setItem('preferred_language', langCode);
        }
        
        function updateUITranslations() {
            document.querySelectorAll('[data-translate]').forEach(element => {
                const key = element.getAttribute('data-translate');
                if (key) {
                    element.textContent = getTranslation(key);
                }
            });
            
            const questionInput = document.getElementById('question');
            if (questionInput) {
                questionInput.placeholder = getTranslation('question_placeholder');
            }
            
            const depthOptions = document.querySelectorAll('.depth-option');
            depthOptions.forEach((opt) => {
                const titleEl = opt.querySelector('.depth-title');
                const descEl = opt.querySelector('.depth-desc');

                    const depth = opt.dataset.depth;
                    // Only show emojis for non-German, non-Chinese, non-Arabic, non-Portuguese, non-Turkish, and non-Hindi languages

                    const descriptions = {

        document.addEventListener('click', function(event) {
            const selector = document.querySelector('.language-selector');
            if (!selector.contains(event.target)) {
                document.getElementById('langDropdown').classList.remove('show');
            }
        });
        
        window.addEventListener('DOMContentLoaded', () => {
            loadLanguages();
            selectDepth('basic');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            lastQuestion = document.getElementById('question').value;
            lastTradition = document.getElementById('tradition').value;
            
            resultDiv.classList.add('show');
            resultDiv.classList.remove('error');
            loadingDiv.style.display = 'block';
            contentDiv.innerHTML = '';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: lastQuestion,
                        tradition_id: lastTradition,
                        language: currentLang,
                        depth: currentDepth,
                        conversation_id: conversationId
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                loadingDiv.style.display = 'none';
                convIndicator.classList.add('show');
                
                contentDiv.innerHTML = `
                    <div class="answer">${data.answer}</div>
                    <div class="metadata">
                        <span class="badge">${data.metadata.provider}</span>
                        <span>${getTranslation('model')}: ${data.metadata.model}</span>
                        <span>Depth: ${data.depth}</span>
                        <span>Tokens: ${data.metadata.tokens_max}</span>
                    </div>
                    <button class="compare-btn" onclick="showComparison()">
                        ${getTranslation('compare_traditions')}
                    </button>
                    <div class="follow-up-input show">
                        <h4 style="margin-bottom: 10px; color: #333;">${getTranslation('continue_conversation')}</h4>
                        <textarea 
                            id="followUpQuestion" 
                            placeholder="${getTranslation('follow_up_placeholder')}"
                            style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; min-height: 80px; margin-bottom: 10px;"
                        ></textarea>
                        <button onclick="askFollowUp()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600;">
                            ${getTranslation('ask_follow_up')}
                        </button>
                    </div>
                    <div id="comparison-section" class="compare-section" style="display: none;">
                        <div id="comparison-loading" class="loading">
                            <div class="spinner"></div>
                            <p>${getTranslation('comparing')}</p>
                        </div>
                        <div id="comparison-content"></div>

                    <div class="answer">❌ ${getTranslation('error')}: ${error.message}</div>

                submitBtn.disabled = false;
            }

        async function askFollowUp() {
            const followUpInput = document.getElementById('followUpQuestion');
            const followUpQuestion = followUpInput.value.trim();
            
            if (!followUpQuestion) {
                alert('Please enter a follow-up question');
                return;
            }
            
            const followUpSection = document.querySelector('.follow-up-input');
            followUpSection.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>${getTranslation('generating_answer')}</p>
                </div>
            `;
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/followup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: followUpQuestion,
                        tradition_id: lastTradition,
                        conversation_id: conversationId,
                        language: currentLang,
                        context_window: 3
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                contentDiv.innerHTML += `
                    <div style="margin-top: 30px; padding-top: 20px; border-top: 2px dashed #667eea;">
                        <h4 style="color: #667eea; margin-bottom: 10px;">💬 Follow-up Answer:</h4>
                        <div class="answer">${data.answer}</div>
                        <div class="metadata">
                            <span>Context messages: ${data.context_messages}</span>
                            <span>${getTranslation('provider')}: ${data.metadata.provider}</span>
                        </div>
                    </div>
                `;
                
                followUpSection.innerHTML = `
                    <h4 style="margin-bottom: 10px; color: #333;">${getTranslation('continue_conversation')}</h4>
                    <textarea 
                        id="followUpQuestion" 
                        placeholder="${getTranslation('follow_up_placeholder')}"
                        style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; min-height: 80px; margin-bottom: 10px;"
                    ></textarea>
                    <button onclick="askFollowUp()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600;">
                        ${getTranslation('ask_follow_up')}
                    </button>
                `;
                
            } catch (error) {
                followUpSection.innerHTML = `
                    <div class="comparison-card" style="border-left-color: #c33;">
                        <div class="comparison-tradition" style="color: #c33;">❌ ${getTranslation('error')}</div>
                        <div class="comparison-summary">${error.message}</div>
                    </div>
                `;
            }
        }
        
        async function showComparison() {
            const comparisonSection = document.getElementById('comparison-section');
            const comparisonLoading = document.getElementById('comparison-loading');
            const comparisonContent = document.getElementById('comparison-content');
            
            comparisonSection.style.display = 'block';
            comparisonLoading.style.display = 'block';
            comparisonContent.innerHTML = '';
            
            try {
                const response = await fetch('http://localhost:8000/api/v1/compare', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: lastQuestion,
                        exclude: lastTradition,
                        language: currentLang
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                comparisonLoading.style.display = 'none';
                
                let html = `<h3 style="margin-bottom: 15px; color: #333;">${getTranslation('other_traditions')}:</h3>`;
                
                data.comparisons.forEach(comp => {
                    html += `
                        <div class="comparison-card">
                            <div class="comparison-tradition">${comp.tradition_name}</div>
                            <div class="comparison-summary">${comp.summary}</div>
                        </div>
                    `;
                });
                
                comparisonContent.innerHTML = html;
                
            } catch (error) {
                comparisonLoading.style.display = 'none';
                comparisonContent.innerHTML = `
                    <div class="comparison-card" style="border-left-color: #c33;">
                        <div class="comparison-tradition" style="color: #c33;">❌ ${getTranslation('error')}</div>
                        <div class="comparison-summary">${error.message}</div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
